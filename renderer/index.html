<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BeanyBox</title>
<script>
(function () {
  try {
    var theme = localStorage.getItem('beanybox_theme') || 'system';
    if (theme === 'system') {
      theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }
    document.documentElement.dataset.theme = theme;
    document.documentElement.dataset.density = localStorage.getItem('beanybox_density') || 'comfortable';
  } catch (e) {}
})();
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="titlebar">
    <div class="titlebar-left">
      <span class="chevron">&#10095;_</span>
      <span id="titlebar-label">BeanyBox - TerMAIL</span>
    </div>
    <div class="titlebar-buttons">
      <div class="tb-btn" id="btn-min" title="Minimize">&#9472;</div>
      <div class="tb-btn" id="btn-max" title="Maximize">&#9633;</div>
      <div class="tb-btn tb-close" id="btn-close" title="Close">&#10005;</div>
    </div>
  </div>

  <div id="root" class="root"></div>
  <div id="modal-root"></div>

  <script src="renderer.js"></script>
</body>
</html>
